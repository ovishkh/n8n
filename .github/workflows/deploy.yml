name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Extract workflows data
        run: npm run extract
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: "website"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment successful! Website is live."

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check logs for details."
